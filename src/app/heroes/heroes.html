<h2>My Heroes</h2>

<ul>
  <li *ngFor="let hero of heroes" (click)="selectHero(hero)">
    {{ hero.name | removeSpaces }}
  </li>
</ul>

<div *ngIf="selectedHero">
  <h3>Selected Hero:</h3>
  <p>{{ selectedHero.name | removeSpaces }}</p>
</div>

<br><br>

<input type="text" appInputFormat placeholder="Type something..." />
